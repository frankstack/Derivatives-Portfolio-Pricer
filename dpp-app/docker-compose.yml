services:
  postgres:
    image: postgres:16-alpine
    container_name: dpp-postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: ${POSTGRES_DB:-dpp}
      POSTGRES_USER: ${POSTGRES_USER:-dpp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dpp_local_pw_change_me}

    volumes:
      - dpp_pgdata:/var/lib/postgresql/data

    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 12

  api:
    build:
      context: ./MCSimulator/MonteCarloSimulatorAPI
      dockerfile: Dockerfile

    image: dpp-api:local
    container_name: dpp-api
    restart: unless-stopped

    logging:
      driver: awslogs
      options:
        awslogs-region: us-east-2
        awslogs-group: /dpp/api
        awslogs-stream: ${EC2_INSTANCE_ID:-i-REPLACE_ME}/api

    depends_on:
      postgres:
        condition: service_healthy

    environment:
      ASPNETCORE_ENVIRONMENT: "Production"
      ASPNETCORE_URLS: "http://0.0.0.0:8080"
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=${POSTGRES_DB:-dpp};Username=${POSTGRES_USER:-dpp};Password=${POSTGRES_PASSWORD:-dpp_local_pw_change_me};"
      DPP_INGEST_KEY: "${DPP_INGEST_KEY}"

    ports:
      - "127.0.0.1:${API_PORT:-5022}:8080"

volumes:
  dpp_pgdata:
