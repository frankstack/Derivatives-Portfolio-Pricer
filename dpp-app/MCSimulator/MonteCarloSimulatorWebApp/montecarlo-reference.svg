<text xml:space="preserve" text-anchor="start" x="687.98" y="-84.45" font-family="Inter, Helvetica, Arial, sans-serif" font-size="13.50">Each path is translated into a payoff</text>
<text xml:space="preserve" text-anchor="start" x="687.98" y="-68.25" font-family="Inter, Helvetica, Arial, sans-serif" font-size="13.50">using the contract definition.</text>
<polygon fill="#f5f7fa" stroke="none" points="682.98,-22.2 682.98,-59.2 937.37,-59.2 937.37,-22.2 682.98,-22.2"/>
<text xml:space="preserve" text-anchor="start" x="687.98" y="-43.05" font-family="Inter, Helvetica, Arial, sans-serif" font-size="13.50">          </text>
<text xml:space="preserve" text-anchor="start" x="721.73" y="-43.05" font-family="Courier New" font-size="13.50" fill="#2e3a46">Payoff(Path i) = g(S path)</text>
<text xml:space="preserve" text-anchor="start" x="695.41" y="-29.55" font-family="Courier New" font-size="13.50" fill="#2e3a46">Example: max(ST − K, 0)</text>
<text xml:space="preserve" text-anchor="start" x="897.94" y="-29.55" font-family="Inter, Helvetica, Arial, sans-serif" font-size="13.50">        </text>
<polygon fill="none" stroke="#2e3a46" points="681.98,-21.2 681.98,-128.8 938.37,-128.8 938.37,-21.2 681.98,-21.2"/>
</g>
