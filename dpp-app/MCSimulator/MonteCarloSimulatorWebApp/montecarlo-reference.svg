<text xml:space="preserve" text-anchor="start" x="1114.71" y="-111.65" font-family="Inter, Helvetica, Arial, sans-serif" font-size="13.50">          </text>
<text xml:space="preserve" text-anchor="start" x="1148.46" y="-111.65" font-family="Inter, Helvetica, Arial, sans-serif" font-weight="bold" font-size="13.50" fill="#f5f7fa">Discounting</text>
<text xml:space="preserve" text-anchor="start" x="1217.47" y="-111.65" font-family="Inter, Helvetica, Arial, sans-serif" font-size="13.50">        </text>
<polygon fill="#f5f7fa" stroke="none" points="1048.35,-59.2 1048.35,-101.6 1310.83,-101.6 1310.83,-59.2 1048.35,-59.2"/>
<text xml:space="preserve" text-anchor="start" x="1053.35" y="-84.45" font-family="Inter, Helvetica, Arial, sans-serif" font-size="13.50">Payoffs are converted to present value</text>
<text xml:space="preserve" text-anchor="start" x="1053.35" y="-68.25" font-family="Inter, Helvetica, Arial, sans-serif" font-size="13.50">using the rate curve for the horizon.</text>
<polygon fill="#f5f7fa" stroke="none" points="1048.35,-22.2 1048.35,-59.2 1310.83,-59.2 1310.83,-22.2 1048.35,-22.2"/>
<text xml:space="preserve" text-anchor="start" x="1053.35" y="-43.05" font-family="Inter, Helvetica, Arial, sans-serif" font-size="13.50">          </text>
<text xml:space="preserve" text-anchor="start" x="1087.1" y="-43.05" font-family="Courier New" font-size="13.50" fill="#2e3a46">PV(Path i) = Payoff(Path i)</text>
<text xml:space="preserve" text-anchor="start" x="1133.68" y="-29.55" font-family="Courier New" font-size="13.50" fill="#2e3a46">· DF(T)</text>
<text xml:space="preserve" text-anchor="start" x="1198.5" y="-29.55" font-family="Inter, Helvetica, Arial, sans-serif" font-size="13.50">        </text>
