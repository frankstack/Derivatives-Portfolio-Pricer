<text xml:space="preserve" text-anchor="start" x="733.86" y="-111.65" font-family="Inter, Helvetica, Arial, sans-serif" font-size="13.50">          </text>
<text xml:space="preserve" text-anchor="start" x="767.61" y="-111.65" font-family="Inter, Helvetica, Arial, sans-serif" font-weight="bold" font-size="13.50" fill="#f5f7fa">Payoff mapping</text>
<text xml:space="preserve" text-anchor="start" x="859.49" y="-111.65" font-family="Inter, Helvetica, Arial, sans-serif" font-size="13.50">        </text>
