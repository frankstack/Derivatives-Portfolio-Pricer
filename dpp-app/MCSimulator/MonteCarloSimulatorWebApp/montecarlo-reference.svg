<text xml:space="preserve" text-anchor="start" x="376.93" y="-56.55" font-family="Courier New" font-size="13.50" fill="#2e3a46">Path 1: S0 → … → ST</text>
<text xml:space="preserve" text-anchor="start" x="360.06" y="-43.05" font-family="Courier New" font-size="13.50" fill="#2e3a46">Path 2: S0 → … → ST</text>
<text xml:space="preserve" text-anchor="start" x="360.06" y="-29.55" font-family="Courier New" font-size="13.50" fill="#2e3a46">Path 3: S0 → … → ST</text>
<text xml:space="preserve" text-anchor="start" x="395.17" y="-16.05" font-family="Courier New" font-size="13.50" fill="#2e3a46">… (N paths)</text>
<text xml:space="preserve" text-anchor="start" x="500.48" y="-16.05" font-family="Inter, Helvetica, Arial, sans-serif" font-size="13.50">        </text>
