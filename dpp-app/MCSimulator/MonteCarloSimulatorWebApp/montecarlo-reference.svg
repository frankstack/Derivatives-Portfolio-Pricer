<!-- Aggregate -->
<g id="node4" class="node">
<title>Aggregate</title>
<polygon fill="#2e3a46" stroke="none" points="1407.5,-122.8 1407.5,-149 1752.35,-149 1752.35,-122.8 1407.5,-122.8"/>
<text xml:space="preserve" text-anchor="start" x="1513.93" y="-132.85" font-family="Inter, Helvetica, Arial, sans-serif" font-size="13.50">          </text>
<text xml:space="preserve" text-anchor="start" x="1547.68" y="-132.85" font-family="Inter, Helvetica, Arial, sans-serif" font-weight="bold" font-size="13.50" fill="#f5f7fa">Aggregation</text>
<text xml:space="preserve" text-anchor="start" x="1618.92" y="-132.85" font-family="Inter, Helvetica, Arial, sans-serif" font-size="13.50">        </text>
<polygon fill="#f5f7fa" stroke="none" points="1407.5,-80.4 1407.5,-122.8 1752.35,-122.8 1752.35,-80.4 1407.5,-80.4"/>
<text xml:space="preserve" text-anchor="start" x="1412.5" y="-105.65" font-family="Inter, Helvetica, Arial, sans-serif" font-size="13.50">The price is the average of discounted</text>
<text xml:space="preserve" text-anchor="start" x="1412.5" y="-89.45" font-family="Inter, Helvetica, Arial, sans-serif" font-size="13.50">outcomes across all simulated paths.</text>
<polygon fill="#f5f7fa" stroke="none" points="1407.5,-43.4 1407.5,-80.4 1752.35,-80.4 1752.35,-43.4 1407.5,-43.4"/>
<text xml:space="preserve" text-anchor="start" x="1457.73" y="-64.25" font-family="Inter, Helvetica, Arial, sans-serif" font-size="13.50">          </text>
<text xml:space="preserve" text-anchor="start" x="1491.48" y="-64.25" font-family="Courier New" font-size="13.50" fill="#2e3a46">Price ≈ mean(PV(Path i))</text>
<text xml:space="preserve" text-anchor="start" x="1412.5" y="-50.75" font-family="Courier New" font-size="13.50" fill="#2e3a46">Uncertainty ≈ std(PV(Path i)) / √N</text>
<text xml:space="preserve" text-anchor="start" x="1720.35" y="-50.75" font-family="Inter, Helvetica, Arial, sans-serif" font-size="13.50">        </text>
<polygon fill="#f5f7fa" stroke="none" points="1407.5,-1 1407.5,-43.4 1752.35,-43.4 1752.35,-1 1407.5,-1"/>
<text xml:space="preserve" text-anchor="start" x="1412.5" y="-26.25" font-family="Inter, Helvetica, Arial, sans-serif" font-size="13.50">Output: point estimate and a precision</text>
<text xml:space="preserve" text-anchor="start" x="1412.5" y="-10.05" font-family="Inter, Helvetica, Arial, sans-serif" font-size="13.50">measure (standard error / confidence band).</text>
<polygon fill="none" stroke="#2e3a46" points="1406.5,0 1406.5,-150 1753.35,-150 1753.35,0 1406.5,0"/>
</g>
