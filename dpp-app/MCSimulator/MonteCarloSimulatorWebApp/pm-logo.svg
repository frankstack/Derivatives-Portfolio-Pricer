<!-- pm-logo-dpp.svg (bars/line/dots shifted up to avoid overlapping DPP tag) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="DPP Portfolio Manager">
  <defs>
    <linearGradient id="pmAccent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1ABC9C"/>
      <stop offset="1" stop-color="#16A085"/>
    </linearGradient>
  </defs>

  <!-- Outer mark (rounded square) -->
  <rect x="6" y="6" width="52" height="52" rx="14" fill="none" stroke="url(#pmAccent)" stroke-width="3"/>

  <!-- Shift chart elements upward to clear the DPP pill -->
  <g transform="translate(0,-4)">
    <!-- Bars (positions) -->
    <rect x="18" y="34" width="6" height="14" rx="2" fill="#ECF0F1" opacity="0.92"/>
    <rect x="29" y="26" width="6" height="22" rx="2" fill="#ECF0F1" opacity="0.92"/>
    <rect x="40" y="38" width="6" height="10" rx="2" fill="#ECF0F1" opacity="0.92"/>

    <!-- Price path (valuation / risk curve) -->
    <path d="M17 40 L24 33 L32 36 L43 30 L50 26"
          fill="none" stroke="url(#pmAccent)" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Terminal dot -->
    <circle cx="50" cy="26" r="3.2" fill="url(#pmAccent)"/>

    <!-- Subtle Monte Carlo “dots” -->
    <circle cx="18" cy="20" r="1.6" fill="#ECF0F1" opacity="0.55"/>
    <circle cx="22" cy="18" r="1.2" fill="#ECF0F1" opacity="0.40"/>
    <circle cx="20" cy="24" r="1.2" fill="#ECF0F1" opacity="0.40"/>
  </g>

  <!-- DPP tag (stays put) -->
  <rect x="22" y="45" width="20" height="10" rx="5" fill="#ECF0F1" opacity="0.95"/>
  <text x="32" y="52.5" text-anchor="middle"
        font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial"
        font-size="7.5" font-weight="800" letter-spacing="0.6"
        fill="#16A085">DPP</text>
</svg>
