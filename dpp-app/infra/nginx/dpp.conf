server {
    listen 80;
    server_name _;

    root /var/www/dpp-ui;
    index portfolioManager.html;

    access_log /var/log/nginx/dpp.access.log;
    error_log  /var/log/nginx/dpp.error.log;

    location / {
        try_files $uri $uri/ /portfolioManager.html;
    }

    location /api/ {
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # IMPORTANT: same port TB used in Dockers configuration.
        proxy_pass http://127.0.0.1:5022;
    }
}
